<g-dev-head>
  <script>
    (function () {
      const urlParams = new URLSearchParams(window.location.search);
      const targetLaunchDate = urlParams.get("launchDate");

      if (targetLaunchDate) {
        const targetTime = new Date(targetLaunchDate).getTime();
        const startTime = performance.now();

        const MockDate = class extends Date {
          constructor(...args) {
            if (args.length === 0) {
              super(targetTime + (performance.now() - startTime));
            } else {
              super(...args);
            }
          }
        };
        MockDate.now = () => targetTime + (performance.now() - startTime);
        window.Date = MockDate;
        console.warn(
          "⏳ [Time Travel] System time overridden to: " + targetLaunchDate,
        );
      }
    })();
  </script>
</g-dev-head>

<g-dev-body>
  <div
    id="vite-master-dev-panel"
    style="
      position: fixed;
      top: 20px;
      right: 20px;
      background: #1a1a1a;
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      z-index: 999999;
      font-family: system-ui, sans-serif;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.6);
      border: 1px solid #333;
      width: 220px;
      font-size: 13px;
    "
  >
    <h4
      style="
        margin: 0 0 10px 0;
        color: #ff9900;
        border-bottom: 1px solid #333;
        padding-bottom: 5px;
        text-transform: uppercase;
        font-size: 11px;
        letter-spacing: 1px;
      "
    >
      🛠️ Master Dev Panel
    </h4>

    <div style="margin-bottom: 15px">
      <label style="display: block; margin-bottom: 6px; color: #aaa"
        >Launch Scenario:</label
      >
      <div style="display: flex; gap: 4px">
        <input
          type="datetime-local"
          id="dev-panel-calendar"
          style="

            padding: 5px;
            border-radius: 4px;
            border: 1px solid #444;

            color: #fff;
            font-size: 11px;
            box-sizing: border-box;
          "
        />
        <button
          onclick="globalTimeTravel()"
          style="

            color: #000;
            border: none;
            padding: 0 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          Go
        </button>
      </div>
    </div>

    <div>
      <label style="display: block; margin-bottom: 6px; color: #aaa"
        >Open Canvas Panel:</label
      >
      <div style="display: flex; flex-direction: column; gap: 6px">
        <button
          onclick="globalLaunchScreen(3840, 2160)"
          style="
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 11px;
          "
        >
          📺 4K Signage (3840x2160)
        </button>
        <button
          onclick="globalLaunchScreen(1920, 1080)"
          style="
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 11px;
          "
        >
          📺 Standard HD (1920x1080)
        </button>
        <button
          onclick="globalLaunchScreen(1360, 768)"
          style="
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 11px;
          "
        >
          📺 XS Fix (1360x768)
        </button>
        <button
          onclick="globalLaunchScreen(1024, 600)"
          style="
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 11px;
          "
        >
          📺 Legacy Webview (1024x600)
        </button>
        <button
          onclick="globalLaunchScreen(800, 600)"
          style="
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 11px;
          "
        >
          📺 XS (800x600)
        </button>
        <button
          onclick="globalLaunchScreen(720, 480)"
          style="
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-size: 11px;
          "
        >
          📺 XXS Test Screen (720x480)
        </button>
      </div>
    </div>
  </div>

  <script>
    const activeParamDate = new URLSearchParams(window.location.search).get(
      "launchDate",
    );
    if (activeParamDate) {
      document.getElementById("dev-panel-calendar").value = activeParamDate;
    }

    function globalTimeTravel() {
      const chosenDate = document.getElementById("dev-panel-calendar").value;
      const url = new URL(window.location.href);

      if (chosenDate) {
        url.searchParams.set("launchDate", chosenDate);
      } else {
        url.searchParams.delete("launchDate");
      }
      window.location.href = url.toString();
    }

    function globalLaunchScreen(width, height) {
      const chosenDate = document.getElementById("dev-panel-calendar").value;
      const url = new URL(window.location.href);

      if (chosenDate) {
        url.searchParams.set("launchDate", chosenDate);
      } else {
        url.searchParams.delete("launchDate");
      }
      window.open(
        url.toString(),
        "_blank",
        `width=${width},height=${height},resizable=yes,scrollbars=yes`,
      );
    }

    const screenSizes = [
      { w: 3840, h: 2160, title: "📺 4K Signage (3840x2160)" },
      { w: 1920, h: 1080, title: "📺 Standard HD (1920x1080)" },
      { w: 1360, h: 768, title: "📺 XS Fix (1360x768)" },
      { w: 1024, h: 600, title: "📺 Legacy Webview (1024x600)" },
      { w: 800, h: 600, title: "📺 XS (800x600)" },
      { w: 720, h: 480, title: "📺 XXS Test Screen (720x480)" },
    ];
  </script>
</g-dev-body>
